{
  "schema": "https://soa-harness.org/schemas/v1.0/pin-lock.schema.json",
  "description": "Pins this validator to a specific SOA-Harness specification commit. The must-maps, test vectors, and schemas that define 'conformant' behavior are read from the spec repo at exactly this commit. Bumping is a reviewable action; never bump silently.",
  "spec_repo": "https://github.com/wleeb1010/soa-harness-specification",
  "spec_commit_sha": "559dec8588441bc29639190870e4541146242b90",
