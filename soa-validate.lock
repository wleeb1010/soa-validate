  "spec_manifest_status": "placeholder",
  "consumed_artifacts": {
    "soa-validate-must-map.json": "the 213-test catalog this validator runs",
    "ui-validate-must-map.json": "UI-profile test catalog",
    "schemas/": "JSON Schema 2020-12 validators used to verify implementation artifacts",
    "test-vectors/": "pinned golden outputs the validator checks implementations against",
    "test-vectors/jcs-parity/": "cross-language JCS byte-equivalence ground truth (Go side uses canonicaljson-go)"
  },
  "pin_bump_protocol": "Open GitHub issue on this repo announcing intent to bump. Identify which spec commits are being adopted and which test-IDs or vectors are affected. Wait 24h for sibling-session (soa-harness-impl) acknowledgment. Merge in lockstep — validator and implementation never ship against mismatched spec commits. A validator that pins to a different spec commit than the implementation it tests is diagnosing the wrong system.",
  "next_review": "After each spec-repo commit that touches soa-validate-must-map.json, schemas/, test-vectors/, or the two Markdown spec files."
}
